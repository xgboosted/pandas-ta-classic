name: Mirror to Codeberg

on:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push mirror
        run: |
          git config http.postBuffer 524288000
          git remote add codeberg https://USER:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/xgboosted/pandas-ta-classic.git
          for i in 1 2 3; do
            git push --all --force codeberg && break || sleep 10
          done
          git push --tags --force codeberg
